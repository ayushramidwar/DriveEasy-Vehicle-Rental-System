<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-social=1.0">
<title>Login - DriveEasy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header text-center">
                    <h3>Login</h3>
                </div>

                <form>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="loginEmaail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="loginpassword" class="form-control" required>
                    </div>

                    <button type="button" onclick="loginUser()" class="btn btn-primary w-100">
                        Login
                    </button>

                </form>
            </div>
        </div>
    </div>
</body>
</html>
