<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Vehicle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="card-header bg-primary text-white">
    <h3>Vehicle Booking</h3>
</div>

<div class="card-body">
    <h4>Hyudai Creta</h4>
</div>

<p>
    Price Per Day :
    <strong>₹2500</strong>
</p>
<hr>
<div class="row">
    <div class="col-md-6">
        <label>Start Date</label>

        <input
        type="date"
        id="startDat"
        class="form-control">
    </div>

    <div class="col-md-6">
        <label>End Date</label>

        <input type="date"
        id="endDate"
        class="form-control">
    </div>

    <div>
        <br>
        <button
            class="btn btn-success"
            onclick="calculateTotal()">
            Calculate Cost
        </button>

        <hr>
        <h5 id="days">
            Total Days : 0
        </h5>

        <h4 id="amount">
            Total cost : ₹0
        </h4>

        <a href="booking-success.html"
           class="btn btn-primary">
            Confirm booking
        </a>
    </div>
</div>
<script src="js/script.js"></script>
</body>
</html>
